<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Cylinder</title>
  <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="../assets/css/legacy-theme.css">
  <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>
  <div class="header"><div class="container"><div class="header-top"><div class="header-left"><ul data-auth-links data-register-href="../registration.html" data-login-href="../login.html"></ul></div><div class="header-right"><div class="search2"><input type="text" value="Cylinder booking form" readonly></div></div><div class="clearfix"></div></div></div></div>
  <div class="header-bottom"><div class="container"><div class="logo"><a href="consumer-dashboard.html"><img src="../assets/theme/images/logo11.PNG" class="img-responsive" alt="Logo"></a></div><div class="head-nav"><span class="menu" data-menu-toggle=".head-nav ul"></span><ul><li><a href="consumer-dashboard.html">Home</a></li><li class="active"><a href="book-cylinder.html">Book Cylinder</a></li><li><a href="order-history.html">Orders</a></li><li><a href="profile.html">Profile</a></li><li><a href="#" data-logout>Logout</a></li><div class="clearfix"></div></ul></div><div class="clearfix"></div></div></div>
  <div class="banner-1"></div>
  <div class="main-1">
    <div class="container">
      <div class="register">
        <div id="bookingNotice" class="app-notice"></div>
        <form id="bookingForm">
          <div class="register-top-grid">
            <h3>Selender Book Now</h3>
            <div><span>Full Name<label>*</label></span><input id="bookingFullName" class="app-input" type="text" required></div>
            <div><span>UN Number<label>*</label></span><input id="bookingUNNumber" class="app-input" type="text" required></div>
            <div><span>Select Selender<label>*</label></span><select id="bookingCylinder" class="app-select"><option>32KG</option><option>16KG</option></select></div>
          </div>
          <div class="register-bottom-grid">
            <h3>Address Details</h3>
            <div><span>Address<label>*</label></span><input id="bookingAddress" class="app-input" type="text" required></div>
            <div><span>Post Code<label>*</label></span><input id="bookingPostalCode" class="app-input" type="text" required></div>
          </div>
          <div class="clearfix"></div>
          <div class="register-but">
            <button class="app-button" type="submit">Confirm Booking</button>
            <a class="app-button is-secondary" href="consumer-dashboard.html">Back to Dashboard</a>
          </div>
        </form>
      </div>
    </div>
  </div>
  <div class="footer-bottom"><div class="container"><p>© 2026 Indian Gas Agency</p></div></div>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
  <script src="../assets/js/app.js"></script>
  <script src="../assets/js/jquery.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/booking.js"></script>
</body>
</html>
