<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Login</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/flexslider.css">
  <link rel="stylesheet" href="assets/css/legacy-theme.css">
  <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>
<div class="header"><div class="container"><div class="header-top"><div class="header-left"><ul data-auth-links data-login-href="consumer-login.html" data-register-href="consumer-registration.html"></ul></div><div class="header-right"><div class="search2"><input type="text" value="Choose login type" readonly></div></div></div></div></div>
<div class="main-1"><div class="container"><div class="login-page"><div class="app-panel">
  <h2 style="text-align:center;">Choose Login</h2>
  <div class="auth-choice-grid">
    <div class="auth-choice-card">
      <h4>Consumer Login</h4>
      <p>Use the customer demo or login with any consumer account stored in Firebase.</p>
      <a class="app-button" href="consumer-login.html">Open Consumer Login</a>
    </div>
    <div class="auth-choice-card">
      <h4>Admin Login</h4>
      <p>Use the admin demo or login with any admin account stored in Firebase.</p>
      <a class="app-button" href="admin-login.html">Open Admin Login</a>
    </div>
  </div>
</div></div></div></div>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics-compat.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
